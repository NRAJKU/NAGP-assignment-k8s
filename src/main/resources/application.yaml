spring:
  application:
    name: nagp-assignment

  r2dbc:
    url: r2dbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:nagp_assignment}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:password}
    pool:
      enabled: true
      initial-size: 5
      max-size: 20
      max-idle-time: 30m

  flyway:
    enabled: true
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:nagp_assignment}
    user: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:password}
    locations: classpath:db/migration
    validate-on-migrate: true
    clean-disabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
    health:
      probes:
        enabled: true

  endpoint:
    health:
      probes:
        enabled: true

server:
  shutdown: graceful