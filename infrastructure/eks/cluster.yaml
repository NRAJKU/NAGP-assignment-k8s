apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: nagp-assignment
  region: ap-south-1
  version: "1.32"

iam:
  withOIDC: true

managedNodeGroups:
  - name: worker-nodes
    instanceType: t3.small
    desiredCapacity: 2
    minSize: 2
    maxSize: 3
    volumeType: gp3
    volumeSize: 20
    labels:
      workload: application

addons:
  - name: vpc-cni
  - name: kube-proxy
  - name: coredns
  - name: aws-ebs-csi-driver